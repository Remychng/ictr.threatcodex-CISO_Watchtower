<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICTR Threat Actor Watchtower</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Deutsche Börse ICTR — CISO Watchtower Threat Dashboard</h1>
      <p class="sub">Threat actor intelligence by region, country, and group type</p>
    </div>
    <div class="updated">Last updated: <span id="lastUpdated">Loading…</span></div>
  </header>

  <main class="layout">
    <section class="panel controls-panel">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search actors, aliases, TTPs, industries, regions..." />
      </div>
      <div class="filters">
        <div class="filter-group">
          <span>Threat Type</span>
          <div id="typeFilters" class="btn-row">
            <button class="filter-btn active" data-type="all">All</button>
            <button class="filter-btn" data-type="state">State-Sponsored</button>
            <button class="filter-btn" data-type="ransomware">Ransomware</button>
            <button class="filter-btn" data-type="hacktivist">Hacktivist</button>
          </div>
        </div>
        <div class="filter-group">
          <span>Region</span>
          <div id="regionFilters" class="btn-row">
            <button class="filter-btn active" data-region="all">All</button>
            <button class="filter-btn" data-region="Asia-Pacific">Asia-Pacific</button>
            <button class="filter-btn" data-region="Europe">Europe</button>
            <button class="filter-btn" data-region="Middle East">Middle East</button>
            <button class="filter-btn" data-region="Americas">Americas</button>
            <button class="filter-btn" data-region="Global/Multi-region">Global</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div id="summary" class="summary"></div>
      <div id="dashboard"></div>
    </section>
  </main>

  <template id="tableTemplate">
    <table class="actor-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Aliases</th>
          <th>Type</th>
          <th>Active Since</th>
          <th>Last Observed</th>
          <th>Status</th>
          <th>Targets</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </template>

  <script src="script.js"></script>
</body>
</html>
