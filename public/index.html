<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreatCodex — Threat Actor Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo-shield.png" alt="ThreatCodex shield" />
        <div class="brand-text">
          <h1>ThreatCodex</h1>
          <p>Threat Actor Intelligence</p>
        </div>
      </div>

      <div class="clock" aria-label="Current time">
        <span id="clock-time">--:--</span>
        <span class="clock-date" id="clock-date"></span>
      </div>

      <div class="org">
        <span class="version">v1.0.0</span>
        <img class="org-logo" src="assets/logo-dbg.jpg" alt="Deutsche Börse Group" />
      </div>
    </header>

    <main class="layout">
      <section class="globe-wrap">
        <div class="search" id="search">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M21 21l-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="Search threat actor or alias…"
            autocomplete="off"
            aria-label="Search threat actor"
          />
          <ul class="search-results" id="search-results" role="listbox"></ul>
        </div>

        <div id="globe"></div>
        <div class="globe-legend" id="globe-legend">
          <div class="legend-row">
            <span class="legend-label">Fewer</span>
            <span class="legend-gradient"></span>
            <span class="legend-label">More actors</span>
          </div>
          <div class="legend-row legend-target" id="legend-target" hidden>
            <span class="legend-swatch"></span> Targeted by selected actor
          </div>
        </div>
      </section>

      <aside class="panel" id="panel">
        <!-- Default dashboard view -->
        <section class="dashboard" id="dashboard">
          <h2 class="panel-title">Dashboard</h2>
          <div class="stat-grid" id="stat-grid"></div>
          <div class="block">
            <h3 class="block-title">Classifications</h3>
            <div id="classification-list"></div>
          </div>
          <div class="block">
            <h3 class="block-title">Origin countries</h3>
            <ul class="country-list" id="country-list"></ul>
          </div>
          <p class="hint">
            Click a highlighted country on the globe to list its threat actors,
            or search by name above.
          </p>
        </section>

        <!-- Dynamic detail view (country list or actor detail) -->
        <section class="detail" id="detail" hidden></section>
      </aside>
    </main>

    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="https://unpkg.com/globe.gl@2"></script>
    <script src="js/api.js"></script>
    <script src="js/globe.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
